    <script>
      (function() {
        try {
          var v = localStorage.getItem('theme');
          if (v === 'dark' || (!v && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
